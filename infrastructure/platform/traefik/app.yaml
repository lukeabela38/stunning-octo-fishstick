apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: v28.0.0
    helm:
      values: |
        service:
          type: LoadBalancer

        ports:
          web:
            exposedPort: 80
          websecure:
            exposedPort: 443

        providers:
          kubernetesIngress: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true