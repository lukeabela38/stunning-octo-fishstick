apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-argocd-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/lukeabela38/stunning-octo-fishstick.git'
    targetRevision: HEAD
    path: infrastructure/argocd/install  # Points directly to the Kustomization directory above
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
